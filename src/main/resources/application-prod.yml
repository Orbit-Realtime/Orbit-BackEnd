spring:

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        default_batch_fetch_size: 100

server:
  port: ${PORT:8080}
  servlet:
    session:
      cookie:
        secure: true
        same-site: none
        http-only: true

login:
  concurrent:
    limit: 30

bcrypt:
  semaphore:
    permits: 3

app:
  allowed-origin: ${ALLOWED_ORIGIN}
