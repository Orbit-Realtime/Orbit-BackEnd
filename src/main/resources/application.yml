springdoc:
  swagger-ui:
    path: /docs/swagger-ui.html # UI 경로 변경
    enabled: true              # UI 활성화
    doc-expansion: list        # 초기 문서 펼침 설정
    operations-sorter: alpha   # API 정렬 방식
    persist-authorization: true # 로그인 후 세션 쿠키를 브라우저에 유지
  api-docs:
    path: /api-docs            # API 문서 경로 변경
    enabled: true              # API 문서 생성 활성화
  version: v3.0.1              # OpenAPI 스펙 버전 (선택 사항, Springdoc이 처리)

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
      base-path: /actuator

  metrics:
    tags:
      application: chat-backend
      environment: ${spring.profiles.active}

    enable:
      jvm: true
      system: true
      process: true
      tomcat: true
      hikaricp: true

    distribution:
      percentiles-histogram:
        http.server.requests: true
        ws_send_duration: true
      slo:
        http.server.requests: 100ms,200ms,500ms,1s,2s
        ws_send_duration: 1ms,5ms,10ms,50ms,100ms,500ms
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        ws_send_duration: 0.95, 0.99

  prometheus:
    metrics:
      export:
        enabled: true
        step: 1m

  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

spring:
  datasource:
    hikari:
      register-mbeans: true
  jmx:
    enabled: true